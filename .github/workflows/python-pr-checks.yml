name: Python PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  python-checks:
    name: Lint and test Python
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run flake8
        run: flake8 .

      - name: Run pytest
        run: pytest -v
