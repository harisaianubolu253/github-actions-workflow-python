name: JavaScript PR Checks

on:
  push: :
    branches:
      - master

jobs:
  javascript-checks:
    name: Lint and test JavaScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: javascript-demo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run JavaScript tests
        run: npm test
